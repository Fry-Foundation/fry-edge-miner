###############################################################################
# Diiisco Node - Production Docker Compose
# 
# Deploys a real Diiisco node (https://github.com/Diiisco-Inc/diiisco-node)
# with Ollama as the LLM backend. Designed for automated deployment to
# customer machines (Windows & Linux).
#
# Wallet credentials are baked into the Diiisco image at build time.
# Do NOT store .env files with mnemonics on customer machines.
###############################################################################

services:

  # ─── Ollama: Local LLM Inference Engine ───────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: diiisco-ollama
    restart: unless-stopped
    environment:
      OLLAMA_CPU_ONLY: "1"
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ─── Model Bootstrapper: Pulls phi (Phi-2) into Ollama on first run ──
  # NOTE: the library model name is "phi" (Phi-2 2.7B) — "phi2" does not
  # exist in the Ollama registry and always fails with MANIFEST_UNKNOWN.
  ollama-init:
    image: ollama/ollama:latest
    container_name: diiisco-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      sh -c "
        if ollama show phi --modelfile 2>/dev/null | grep -q FROM; then
          echo 'Model phi already present - skipping pull.'; exit 0;
        fi;
        for i in 1 2 3; do
          echo Pulling phi model, attempt $$i of 3...;
          if ollama pull phi; then echo 'Model phi ready.'; exit 0; fi;
          sleep 10;
        done;
        echo 'ERROR: failed to pull phi model after 3 attempts.';
        exit 1
      "
    environment:
      OLLAMA_HOST: "http://ollama:11434"

  # ─── Diiisco Node: The real deal ─────────────────────────────────────
  diiisco:
    build:
      context: ./diiisco-node
      dockerfile: Dockerfile
      args:
        ALGO_ADDRESS: ${ALGO_ADDRESS}
        ALGO_MNEMONIC: ${ALGO_MNEMONIC}
        API_KEY: ${DIIISCO_API_KEY}
    image: diiisco-node:latest
    container_name: diiisco-node
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    ports:
      - "8181:8181"
    volumes:
      - diiisco_data:/app/data
    healthcheck:
      # CMD-SHELL required: exec-form CMD passes "||"/"exit"/"1" as literal
      # curl arguments, which fails every probe.
      test: ["CMD-SHELL", "curl -sf http://localhost:8181/v1/models || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  ollama_models:
    name: diiisco_ollama_models
  diiisco_data:
    name: diiisco_node_data
