###############################################################################
# Diiisco Node - Production Docker Compose
# 
# Deploys a real Diiisco node (https://github.com/Diiisco-Inc/diiisco-node)
# with Ollama as the LLM backend. Designed for automated deployment to
# customer machines (Windows & Linux).
#
# Wallet credentials are baked into the Diiisco image at build time.
# Do NOT store .env files with mnemonics on customer machines.
###############################################################################

services:

  # ─── Ollama: Local LLM Inference Engine ───────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: diiisco-ollama
    restart: unless-stopped
    environment:
      OLLAMA_CPU_ONLY: "1"
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ─── Model Bootstrapper: Pulls phi2 into Ollama on first run ─────────
  ollama-init:
    image: ollama/ollama:latest
    container_name: diiisco-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      sh -c "
        echo 'Checking if phi2 model is available...' &&
        if ollama show phi2 --modelfile 2>/dev/null | grep -q 'FROM'; then
          echo 'Model phi2 already exists. Skipping pull.';
        else
          echo 'Pulling phi2 model...' &&
          ollama pull phi2 &&
          echo 'Model phi2 ready.';
        fi
      "
    environment:
      OLLAMA_HOST: "http://ollama:11434"

  # ─── Diiisco Node: The real deal ─────────────────────────────────────
  diiisco:
    build:
      context: ./diiisco-node
      dockerfile: Dockerfile
      args:
        ALGO_ADDRESS: ${ALGO_ADDRESS}
        ALGO_MNEMONIC: ${ALGO_MNEMONIC}
        API_KEY: ${DIIISCO_API_KEY}
    image: diiisco-node:latest
    container_name: diiisco-node
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    ports:
      - "8181:8181"
    volumes:
      - diiisco_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8181/v1/models", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  ollama_models:
    name: diiisco_ollama_models
  diiisco_data:
    name: diiisco_node_data
