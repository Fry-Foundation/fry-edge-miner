name: Build FEM

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [created]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Invalidate cached option_env! artifacts
        run: |
          touch src-tauri/src/config/mod.rs
          touch src-tauri/src/integrations/presearch.rs
          touch src-tauri/src/integrations/diiisco.rs

      - name: Build Tauri app
        run: cargo tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          FEM_API_TOKEN: ${{ secrets.FEM_API_TOKEN }}
          PRESEARCH_REG_CODE: ${{ secrets.PRESEARCH_REG_CODE }}

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: fem-installer-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload NSIS .sig
        uses: actions/upload-artifact@v4
        with:
          name: fem-installer-nsis-sig
          path: src-tauri/target/release/bundle/nsis/*.sig
          if-no-files-found: error

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: fem-installer-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload MSI .sig
        uses: actions/upload-artifact@v4
        with:
          name: fem-installer-msi-sig
          path: src-tauri/target/release/bundle/msi/*.sig
          if-no-files-found: error

      - name: Compose latest.json
        shell: bash
        run: |
          NSIS_SIG=$(cat src-tauri/target/release/bundle/nsis/*.exe.sig)
          VERSION=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          NSIS_EXE=$(ls src-tauri/target/release/bundle/nsis/*.exe | head -1 | xargs -I{} basename {})
          python3 -c "
          import json
          print(json.dumps({
            'version': '${VERSION}',
            'notes': 'FEM ${VERSION}',
            'pub_date': '${PUB_DATE}',
            'platforms': {
              'windows-x86_64': {
                'signature': open('src-tauri/target/release/bundle/nsis/' + [f for f in __import__('os').listdir('src-tauri/target/release/bundle/nsis') if f.endswith('.exe.sig')][0]).read().strip(),
                'url': 'https://github.com/Fry-Foundation/fry-edge-miner/releases/download/v${VERSION}/${NSIS_EXE}'
              }
            }
          }, indent=2))
          " > latest.json
          echo "Generated latest.json:"
          cat latest.json

      - name: Upload latest.json
        uses: actions/upload-artifact@v4
        with:
          name: fem-latest-json
          path: latest.json
          if-no-files-found: error

  release-upload:
    needs: build-windows
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            fem-installer-nsis/*.exe
            fem-installer-nsis-sig/*.sig
            fem-installer-msi/*.msi
            fem-installer-msi-sig/*.sig
            fem-latest-json/latest.json
